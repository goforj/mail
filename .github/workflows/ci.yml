name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
          cache-dependency-path: |
            go.sum
            mailses/go.mod
            mailses/go.sum
            examples/go.mod
            examples/go.sum

      - name: Download dependencies
        run: |
          go mod download
          for module in mailses examples; do
            if [ -f "$module/go.mod" ]; then
              (cd "$module" && go mod download)
            fi
          done

      - name: Run root tests
        run: go test ./... -v

      - name: Run mailses tests
        run: |
          cd mailses
          GOWORK=off go test ./... -v

      - name: Verify generated examples compile
        run: |
          cd examples
          GOWORK=off go test ./... -v

  race:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
          cache-dependency-path: |
            go.sum
            mailses/go.mod
            mailses/go.sum

      - name: Run race tests
        run: go test -race ./...

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
          cache-dependency-path: |
            go.sum
            mailses/go.mod
            mailses/go.sum
            examples/go.mod
            examples/go.sum

      - name: Run combined coverage
        run: bash scripts/coverage-codecov.sh

      - name: Report merged coverage
        run: |
          TOTAL="$(awk -F'[: ]+' 'NR>1 {covered += ($4 > 0 ? $3 : 0); total += $3} END {printf "%.1f%%", (covered/total)*100}' coverage.txt)"
          echo "Merged coverage: $TOTAL"
          {
            echo "## Coverage"
            echo
            echo "- Merged total: $TOTAL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.txt
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
